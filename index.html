<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鏅氫笂鍋氭父鎴忕殑浠撳簱</title>
    <link href="https://cdn.staticfile.org/twitter-bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            font-family: 'Arial', sans-serif;
        }
        h1 {
            text-align: center;
            color: #343a40;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        .section-title {
            margin: 30px 0 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #dee2e6;
            color: #495057;
            font-weight: bold;
        }
        .card {
            height: 100%;
            display: flex;
            flex-direction: column;
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }
        .card-img-container {
            position: relative;
            padding-top: 56.25%;
            overflow: hidden;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }
        .card-img-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
        }
        .card-title {
            margin-bottom: 0.5rem;
            font-size: 1.25rem;
            font-weight: bold;
            color: #343a40;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-buttons {
            margin-top: auto;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: nowrap;
        }
        .card-buttons .btn {
            flex: 1;
            min-width: 0;
            border-radius: 5px;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }
        .card-buttons .btn:hover {
            transform: scale(1.05);
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1>鏅氫笂鍋氭父鎴忕殑浠撳簱</h1>

        <h2 class="section-title">娓告垙寮€鍙戜粨搴?/h2>
        <div id="product-list" class="row"></div>

        <h2 class="section-title">绛旂枒鏈嶅姟</h2>
        <div id="service-list" class="row"></div>

        <div class="footer">
            漏 2026 Night Gamer, Inc. All Rights Reserved.
        </div>
    </div>

    <script src="https://cdn.staticfile.org/jquery/3.2.1/jquery.min.js"></script>
    <script src="https://cdn.staticfile.org/popper.js/1.15.0/umd/popper.min.js"></script>
    <script src="https://cdn.staticfile.org/twitter-bootstrap/4.3.1/js/bootstrap.min.js"></script>

    <script>
        function createCard(title, imageUrl, links) {
            return `
                <div class="col-md-4 mb-4">
                    <div class="card">
                        <div class="card-img-container">
                            <img src="${imageUrl}" class="card-img-top" alt="${title}">
                        </div>
                        <div class="card-body">
                            <h5 class="card-title">${title}</h5>
                            <div class="card-buttons">
                                ${links.map(link =>
                                    `<a href="${link.url}" class="btn ${link.class}" target="_blank">${link.text}</a>`
                                ).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        fetch('data/products.json')
            .then(res => res.json())
            .then(data => {
                const productList = document.getElementById('product-list');
                const serviceList = document.getElementById('service-list');

                data.products.forEach(p => {
                    const links = [
                        { text: '浠撳簱閾炬帴', url: p.buyLink, class: 'btn-primary' },
                        { text: '浣跨敤璇存槑', url: `note.html?id=${p.id}`, class: 'btn-info' }
                    ];
                    productList.innerHTML += createCard(p.title, p.image, links);
                });

                data.services.forEach(s => {
                    const links = [
                        { text: '浣跨敤璇存槑', url: s.buyLink, class: 'btn-primary' }
                    ];
                    serviceList.innerHTML += createCard(s.title, s.image, links);
                });
            })
            .catch(err => {
                console.error('鍔犺浇鍟嗗搧鏁版嵁澶辫触:', err);
                document.getElementById('product-list').innerHTML =
                    '<p class="text-danger text-center">鍔犺浇鏁版嵁澶辫触锛岃鍒锋柊閲嶈瘯銆?/p>';
            });
    </script>
</body>
</html>
