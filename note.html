<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>使用说明</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #343a40;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        .custom-content {
            margin-top: 20px;
            margin-bottom: 20px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 10px;
        }
        .content-text {
            font-size: 16px;
            color: #333;
            line-height: 1.2;
        }
        .content-text br {
            display: none;
        }
        .content-text img {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .img-container {
            text-align: center;
            margin: 20px 0;
        }
        .img-container img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .warning-box {
            background-color: #fff3cd;
            padding: 5px;
            border-radius: 5px;
            font-weight: bold;
        }
        .error-text {
            text-align: center;
            color: #dc3545;
            margin-top: 40px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="page-title">加载中...</h1>
        <div class="img-container">
            <img id="page-image" src="" alt="商品图片" style="display:none;">
        </div>
        <h2 class="card-title text-center">使用说明</h2>
        <div class="custom-content">
            <div id="note-content" class="content-text">
                <p>正在加载...</p>
            </div>
        </div>
        <a href="./" class="back-link">← 返回首页</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (!productId) {
            document.getElementById('page-title').textContent = '参数错误';
            document.getElementById('note-content').innerHTML = '<p class="error-text">缺少商品 ID 参数。</p>';
        } else {
            fetch('data/products.json?t=' + Date.now())
                .then(res => res.json())
                .then(data => {
                    const all = data.products || [];
                    const item = all.find(p => p.id === productId);

                    if (!item) {
                        document.getElementById('page-title').textContent = '未找到商品';
                        document.getElementById('note-content').innerHTML =
                            `<p class="error-text">未找到 ID 为 "${productId}" 的商品。</p>`;
                        return;
                    }

                    document.title = item.title + ' - 使用说明';
                    document.getElementById('page-title').textContent = item.title;

                    const img = document.getElementById('page-image');
                    img.src = item.image;
                    img.style.display = 'block';

                    let noteHtml = '<p class="warning-box">提示：项目无法直接打开，需在店铺购买后，获取项目解压密码</p>';
                    noteHtml += item.note || '<p>暂无使用说明。</p>';
                    document.getElementById('note-content').innerHTML = noteHtml;
                })
                .catch(err => {
                    console.error('加载数据失败:', err);
                    document.getElementById('page-title').textContent = '加载失败';
                    document.getElementById('note-content').innerHTML =
                        '<p class="error-text">加载数据失败，请刷新重试。</p>';
                });
        }
    </script>
</body>
</html>
